PAYLOAD
          base64 -d /tmp/project.b64 > /tmp/project.zip
          mkdir -p "$GITHUB_WORKSPACE/project"
          unzip -q /tmp/project.zip -d "$GITHUB_WORKSPACE/project"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build APK
        working-directory: project
        run: gradle --no-daemon :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: screen-auto-translator-debug
          path: project/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
